services:
  - type: web
    name: vivid-advisory-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY_BASE64
        sync: false
      - key: GOOGLE_DRIVE_PARENT_FOLDER_ID
        sync: false
    healthCheckPath: /health
